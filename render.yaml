# Render Blueprint — backend API (Express + Socket.io + BullMQ).
# In Render: New → Blueprint → pick this repo. It reads this file.
# Secrets marked `sync: false` are typed once in the Render dashboard
# (they are NOT stored in git). JWT secrets are auto-generated by Render.
services:
  - type: web
    name: work-api
    runtime: node
    plan: free
    region: frankfurt          # closest free region to Algeria
    rootDir: .                 # monorepo root (npm workspaces)
    buildCommand: npm install && npm run build -w @work/api
    startCommand: npm run start -w @work/api
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      # ── set these in the dashboard (Environment tab) ──
      - key: CORS_ORIGIN          # https://<your-vercel-app>.vercel.app
        sync: false
      - key: MONGODB_URI          # mongodb+srv://...  (MongoDB Atlas)
        sync: false
      - key: REDIS_URL            # rediss://...        (Upstash)
        sync: false
      - key: OPENAI_API_KEY       # gsk_...             (Groq)
        sync: false
      - key: OAUTH_CALLBACK_BASE  # https://<this-api>.onrender.com/api/v1/auth/oauth
        sync: false
      # ── auto-generated / fixed ──
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: OPENAI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
